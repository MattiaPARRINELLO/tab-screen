<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

    <style>
      /* ========== DESIGN SYSTEM ========== */
      :root {
        /* Palette principale */
        --bg-primary: #0a0e14;
        --bg-secondary: #13171e;
        --bg-card: rgba(25, 30, 40, 0.6);
        --bg-card-hover: rgba(30, 36, 48, 0.8);

        /* Couleurs d'accent dynamiques */
        --accent-primary: #4ecdc4;
        --accent-secondary: #a78bfa;
        --accent-warm: #ff6b9d;
        --accent-gradient: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        );

        /* Texte */
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;

        /* Effets */
        --blur-sm: blur(8px);
        --blur-md: blur(16px);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
        --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.25);
        --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 30px rgba(78, 205, 196, 0.15);

        /* Spacing & Layout */
        --gap-sm: 0.75rem;
        --gap-md: 1.25rem;
        --gap-lg: 2rem;
        --radius-sm: 1rem;
        --radius-md: 1.5rem;
        --radius-lg: 2rem;

        /* Animations */
        --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        --duration-fast: 0.2s;
        --duration-normal: 0.4s;
        --duration-slow: 0.8s;
      }

      /* ========== BASE STYLES ========== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family:
          "Inter",
          -apple-system,
          system-ui,
          sans-serif;
        overflow: hidden;
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      /* Ambient background particles */
      body::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(78, 205, 196, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(167, 139, 250, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 107, 157, 0.04) 0%,
            transparent 50%
          );
        animation: ambient 20s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes ambient {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        100% {
          transform: translate(5%, 3%) rotate(5deg);
        }
      }

      /* ========== LAYOUT GRID ========== */
      .dashboard {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: repeat(10, 1fr);
        gap: var(--gap-md);
        padding: var(--gap-md);
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }

      /* ========== CARD BASE ========== */
      .card {
        background: var(--bg-card);
        backdrop-filter: var(--blur-md);
        -webkit-backdrop-filter: var(--blur-md);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius-lg);
        padding: var(--gap-lg);
        box-shadow: var(--shadow-md);
        overflow: hidden;
        position: relative;
        transition: all var(--duration-normal) var(--ease-smooth);
        display: flex;
        flex-direction: column;
        min-height: 0; /* allow flex children to shrink inside grid cells */
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--accent-gradient);
        opacity: 0;
        transition: opacity var(--duration-normal);
        pointer-events: none;
        z-index: -1;
      }

      .card:not(.hidden) {
        animation: cardEnter var(--duration-slow) var(--ease-smooth) forwards;
      }

      .card.hidden {
        animation: cardExit var(--duration-normal) var(--ease-smooth) forwards;
        pointer-events: none;
      }

      /* Subtle breathing animation */
      @keyframes breathe {
        0%,
        100% {
          box-shadow: var(--shadow-md);
          transform: scale(1);
        }
        50% {
          box-shadow: var(--shadow-md), var(--shadow-glow);
          transform: scale(1.005);
        }
      }

      .card:not(.hidden):not(#musicCard) {
        animation:
          cardEnter var(--duration-slow) var(--ease-smooth) forwards,
          breathe 8s ease-in-out 1s infinite;
      }

      @keyframes cardEnter {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes cardExit {
        to {
          opacity: 0;
          transform: scale(0.9) translateY(-10px);
        }
      }

      /* ========== TIME CARD ========== */
      #timeCard {
        grid-column: 1 / 5;
        grid-row: 1 / 5;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: calc(var(--gap-md) * 1.25);
      }

      .time-display {
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 40px rgba(78, 205, 196, 0.3);
        animation: timeGlow 8s ease-in-out infinite;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        white-space: nowrap;
        padding: 0 var(--gap-sm);
      }

      @keyframes timeGlow {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.2);
        }
      }

      /* ========== WEATHER CARD ========== */
      #weatherCard {
        grid-column: 1 / 5;
        grid-row: 5 / 11;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(var(--gap-md) * 1.25);
      }

      .weather-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--gap-lg);
        width: 100%;
        height: 100%;
      }

      .weather-icon {
        width: clamp(120px, 18vw, 180px);
        height: clamp(120px, 18vw, 180px);
        filter: drop-shadow(0 8px 20px rgba(78, 205, 196, 0.4));
        animation: weatherFloat 12s ease-in-out infinite;
      }

      @keyframes weatherFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .weather-text {
        text-align: center;
        font-size: clamp(1.1rem, 2.5vw, 1.5rem);
        font-weight: 500;
        color: var(--text-secondary);
        line-height: 1.4;
      }

      .weather-temp {
        font-size: clamp(3rem, 6vw, 5rem);
        font-weight: 700;
        color: var(--text-primary);
        margin-top: 0.25rem;
        text-shadow: 0 2px 12px rgba(78, 205, 196, 0.3);
        width: 100%;
        display: flex;
        justify-content: center;
      }

      /* ========== FORECAST CARD (HERO) ========== */
      #forecastCard {
        grid-column: 5 / 13;
        grid-row: 1 / 5;
        display: flex;
        flex-direction: column;
        background: var(--bg-card-hover);
        border: 1px solid rgba(78, 205, 196, 0.15);
        transition: grid-row var(--duration-normal) var(--ease-smooth);
      }

      #forecastCard.expanded {
        grid-row: 1 / 11;
      }

      #forecastCard::before {
        opacity: 0.03;
      }

      .forecast-header {
        font-size: 0.875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-bottom: var(--gap-md);
      }

      .forecast-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: var(--gap-sm);
        flex: 1;
        align-items: stretch;
        height: 100%;
      }

      #forecastCard.expanded .forecast-grid {
        gap: var(--gap-md);
      }

      .forecast-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-md);
        padding: var(--gap-md);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--gap-sm);
        transition: all var(--duration-fast) var(--ease-smooth);
        height: 100%;
        justify-content: center;
      }

      .forecast-item:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(-2px);
      }

      .forecast-time {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }

      .forecast-icon {
        width: 48px;
        height: 48px;
        filter: drop-shadow(0 2px 8px rgba(78, 205, 196, 0.2));
        transition: all var(--duration-normal) var(--ease-smooth);
      }

      #forecastCard.expanded .forecast-icon {
        width: 72px;
        height: 72px;
      }

      .forecast-temp {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        transition: font-size var(--duration-normal) var(--ease-smooth);
      }

      #forecastCard.expanded .forecast-temp {
        font-size: 2rem;
      }

      .forecast-desc {
        font-size: 0.7rem;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.3;
      }

      /* ========== MUSIC CARD ========== */
      #musicCard {
        grid-column: 5 / 13;
        grid-row: 5 / 11;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: calc(var(--gap-lg) * 1.5);
        padding: calc(var(--gap-lg) * 1.5);
        background: rgba(255, 107, 157, 0.15);
        border: 1px solid rgba(255, 107, 157, 0.3);
      }

      #musicCard:not(.hidden) {
        animation: cardEnter var(--duration-slow) var(--ease-smooth) forwards;
      }

      #musicCard::before {
        opacity: 0.1;
      }

      .music-cover-wrapper {
        position: relative;
        flex-shrink: 0;
      }

      .music-cover {
        width: clamp(80px, 8vw, 100px);
        height: clamp(80px, 8vw, 100px);
        border-radius: var(--radius-md);
        object-fit: cover;
        box-shadow:
          var(--shadow-lg),
          0 0 40px rgba(255, 107, 157, 0.3);
        animation: coverPulse 6s ease-in-out infinite;
      }

      @keyframes coverPulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: var(--shadow-lg);
        }
        50% {
          transform: scale(1.02);
          box-shadow:
            var(--shadow-lg),
            0 0 30px rgba(255, 107, 157, 0.4);
        }
      }

      .music-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.5rem;
        min-width: 0;
      }

      .music-track {
        font-size: clamp(1.125rem, 1.75vw, 1.5rem);
        font-weight: 700;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
      }

      .music-artist {
        font-size: clamp(0.875rem, 1.25vw, 1rem);
        font-weight: 500;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0.9;
      }

      .music-progress {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      .music-progress-bar {
        height: 100%;
        background: var(--accent-gradient);
        border-radius: 2px;
        width: 0%;
        transition: width 200ms linear;
        box-shadow: 0 0 18px rgba(78, 205, 196, 0.28);
      }

      .music-progress-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
      }

      .music-duration {
        color: var(--text-secondary);
        font-size: 0.8rem;
        min-width: 42px;
        text-align: right;
        opacity: 0.95;
      }

      /* Music bottom section */
      .music-bottom {
        display: flex;
        flex-direction: row;
        gap: var(--gap-md);
        align-items: center;
        flex-shrink: 0;
        transition:
          transform 450ms var(--ease-smooth),
          gap 380ms var(--ease-smooth),
          max-width 380ms var(--ease-smooth);
      }

      .music-cover,
      .music-info,
      .music-track,
      .music-artist,
      .music-progress-row {
        transition: all 420ms var(--ease-smooth);
      }

      /* ========== RESPONSIVE ADJUSTMENTS ========== */
      @media (max-width: 1200px) {
        .forecast-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .forecast-item:nth-child(n + 4) {
          display: none;
        }
      }

      /* Tablet / small landscape adjustments: remove extra spacing and prevent page panning */
      @media (max-width: 900px), (max-height: 900px) {
        body {
          touch-action: none;
          overscroll-behavior: none;
        }

        .dashboard {
          gap: 0.5rem;
          padding: 0.5rem;
          height: 100vh;
        }

        .card {
          padding: 0.75rem;
          border-radius: 1rem;
        }

        .lyrics-content {
          padding: 2rem 0.5rem;
        }
      }

      @media (max-height: 800px) {
        .dashboard {
          gap: var(--gap-sm);
          padding: var(--gap-md);
        }

        .card {
          padding: var(--gap-md);
        }
      }

      /* ========== LYRICS ========== */
      .lyrics-container {
        position: relative;
        flex: 1;
        min-width: 0;
        width: 100%;
        min-height: 0;
        overflow: hidden;
        max-height: 1000px;
        opacity: 1;
        transform: translateY(0) scale(1);
        transition:
          max-height 420ms var(--ease-smooth),
          opacity 300ms var(--ease-smooth),
          transform 420ms var(--ease-smooth);
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.4) 15%,
          rgba(0, 0, 0, 1) 40%,
          rgba(0, 0, 0, 1) 60%,
          rgba(0, 0, 0, 0.4) 85%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.4) 15%,
          rgba(0, 0, 0, 1) 40%,
          rgba(0, 0, 0, 1) 60%,
          rgba(0, 0, 0, 0.4) 85%,
          transparent 100%
        );
      }

      .lyrics-wrapper {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
      }

      .lyrics-loading,
      .lyrics-none {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 500;
        text-align: center;
        padding: 2rem;
      }

      .lyrics-loading.active,
      .lyrics-none.active {
        display: flex;
      }

      .lyrics-prestart {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 4;
        width: 70px;
        height: 70px;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translate(-50%, calc(-50% + 12px));
        transition:
          opacity 420ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
          visibility 420ms cubic-bezier(0.22, 1, 0.36, 1);
        isolation: isolate;
      }

      .lyrics-prestart.active {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%);
      }

      .lyrics-prestart::before {
        content: "";
        position: absolute;
        inset: -22px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(78, 205, 196, 0.18) 0%,
          rgba(167, 139, 250, 0.12) 40%,
          rgba(78, 205, 196, 0) 72%
        );
        filter: blur(12px);
        z-index: -1;
        opacity: 0.6;
        animation: prestartHaloOrbit 5s cubic-bezier(0.45, 0.05, 0.55, 0.95)
          infinite;
      }

      .lyrics-prestart-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(248, 250, 252, 1),
          rgba(78, 205, 196, 0.85)
        );
        box-shadow:
          0 0 15px rgba(78, 205, 196, 0.5),
          0 0 28px rgba(167, 139, 250, 0.3),
          inset 0 1px 3px rgba(255, 255, 255, 0.4);
        top: 50%;
        left: 50%;
        margin: -5px 0 0 -5px;
        animation: prestartOrganicOrbit 3.6s
          cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }

      .lyrics-prestart-dot:nth-child(1) {
        animation-delay: 0s;
        filter: hue-rotate(0deg);
      }

      .lyrics-prestart-dot:nth-child(2) {
        animation-delay: -1.2s;
        filter: hue-rotate(25deg);
      }

      .lyrics-prestart-dot:nth-child(3) {
        animation-delay: -2.4s;
        filter: hue-rotate(50deg);
      }

      @keyframes prestartOrganicOrbit {
        0% {
          transform: rotate(0deg) translateX(22px) rotate(0deg) scale(0.85);
          opacity: 0.4;
        }
        15% {
          transform: rotate(54deg) translateX(26px) rotate(-54deg) scale(1.05);
          opacity: 0.95;
        }
        25% {
          transform: rotate(90deg) translateX(24px) rotate(-90deg) scale(1);
          opacity: 1;
        }
        40% {
          transform: rotate(144deg) translateX(20px) rotate(-144deg) scale(0.9);
          opacity: 0.7;
        }
        50% {
          transform: rotate(180deg) translateX(22px) rotate(-180deg) scale(0.85);
          opacity: 0.4;
        }
        65% {
          transform: rotate(234deg) translateX(26px) rotate(-234deg) scale(1.05);
          opacity: 0.95;
        }
        75% {
          transform: rotate(270deg) translateX(24px) rotate(-270deg) scale(1);
          opacity: 1;
        }
        90% {
          transform: rotate(324deg) translateX(20px) rotate(-324deg) scale(0.9);
          opacity: 0.7;
        }
        100% {
          transform: rotate(360deg) translateX(22px) rotate(-360deg) scale(0.85);
          opacity: 0.4;
        }
      }

      @keyframes prestartHaloOrbit {
        0%,
        100% {
          transform: scale(0.96) rotate(0deg);
          opacity: 0.45;
        }
        25% {
          transform: scale(1.04) rotate(90deg);
          opacity: 0.65;
        }
        50% {
          transform: scale(0.98) rotate(180deg);
          opacity: 0.5;
        }
        75% {
          transform: scale(1.02) rotate(270deg);
          opacity: 0.6;
        }
      }

      .lyrics-container.prestart-waiting .lyrics-content {
        opacity: 0.2;
        filter: blur(1px);
        transform: scale(0.99);
        transition:
          opacity 260ms var(--ease-smooth),
          filter 260ms var(--ease-smooth),
          transform 260ms var(--ease-smooth);
      }

      .lyrics-loading-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 2s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .lyrics-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 4rem 1rem;
        width: 100%;
      }

      .lyrics-line {
        font-size: 1.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.5;
        padding: 0.5rem 0.5rem;
        border-radius: 0.5rem;
        transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        opacity: 0.4;
        transform: scale(0.95);
        filter: blur(0.5px);
        cursor: default;
        max-width: 100%;
        word-wrap: break-word;
        overflow-wrap: break-word;
        hyphens: auto;
      }

      .lyrics-line.active {
        font-weight: 600;
        color: var(--text-primary);
        opacity: 1;
        transform: scale(1.08);
        filter: blur(0);
        text-shadow: 0 0 20px rgba(78, 205, 196, 0.4);
      }

      .lyrics-line.past {
        opacity: 0.5;
        filter: blur(0);
      }

      .lyrics-line.near {
        opacity: 0.7;
        filter: blur(0);
        transform: scale(0.98);
      }

      /* Responsive lyrics */
      @media (max-width: 1400px) {
        .lyrics-line {
          font-size: 1.6rem;
        }
      }

      @media (max-width: 1100px) {
        .lyrics-line {
          font-size: 1.5rem;
        }
      }

      /* ========== MUSIC FULLSCREEN MODE (no lyrics) ========== */
      #musicCard.fullscreen-mode {
        justify-content: center;
        align-items: center;
      }

      #musicCard.fullscreen-mode .lyrics-container {
        opacity: 0;
        transform: translateY(-18px) scale(0.98);
        max-height: 0;
        flex: 0 0 0;
        pointer-events: none;
      }

      #musicCard.fullscreen-mode .music-bottom {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--gap-lg);
        width: 100%;
        max-width: 500px;
      }

      #musicCard.fullscreen-mode .music-cover-wrapper {
        display: flex;
        justify-content: center;
      }

      #musicCard.fullscreen-mode .music-cover {
        width: clamp(180px, 25vw, 280px);
        height: clamp(180px, 25vw, 280px);
        border-radius: var(--radius-lg);
      }

      #musicCard.fullscreen-mode .music-info {
        align-items: center;
        text-align: center;
        width: 100%;
      }

      #musicCard.fullscreen-mode .music-track {
        font-size: clamp(1.5rem, 2.5vw, 2.25rem);
        white-space: normal;
        text-align: center;
      }

      #musicCard.fullscreen-mode .music-artist {
        font-size: clamp(1rem, 1.5vw, 1.25rem);
        white-space: normal;
        text-align: center;
      }

      #musicCard.fullscreen-mode .music-progress-row {
        justify-content: center;
        margin-top: var(--gap-sm);
      }

      #musicCard.fullscreen-mode .music-progress {
        max-width: 400px;
      }

      /* ========== UTILITY ========== */
      .hidden {
        display: none !important;
      }

      /* ========== PERFORMANCE / REDUCED MOTION ========== */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }

      /* Programmatic class to pause animations when needed */
      .reduced-motion,
      .paused-animations {
        animation-play-state: paused !important;
        transition: none !important;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <!-- TIME CARD -->
      <div id="timeCard" class="card hidden">
        <div class="time-display" id="time">00:00:00</div>
      </div>

      <!-- WEATHER CARD -->
      <div id="weatherCard" class="card hidden">
        <div class="weather-content">
          <img id="weatherIcon" src="" alt="weather" class="weather-icon" />
          <div>
            <div class="weather-text" id="weather">Chargement...</div>
            <div class="weather-temp" id="weatherTemp"></div>
          </div>
        </div>
      </div>

      <!-- FORECAST CARD (HERO) -->
      <div id="forecastCard" class="card hidden">
        <div class="forecast-header">Prévisions</div>
        <div class="forecast-grid" id="forecast"></div>
      </div>

      <!-- MUSIC CARD -->
      <div id="musicCard" class="card hidden">
        <!-- LYRICS CONTAINER -->
        <div class="lyrics-container" id="lyricsContainer">
          <div class="lyrics-wrapper" id="lyricsWrapper">
            <div class="lyrics-loading" id="lyricsLoading">
              <div class="lyrics-loading-spinner"></div>
              <span>Chargement des paroles...</span>
            </div>
            <div class="lyrics-none" id="lyricsNone">
              Pas de paroles disponibles
            </div>
            <div class="lyrics-content" id="lyricsContent"></div>
          </div>
          <div class="lyrics-prestart" id="lyricsPrestart">
            <span class="lyrics-prestart-dot" aria-hidden="true"></span>
            <span class="lyrics-prestart-dot" aria-hidden="true"></span>
            <span class="lyrics-prestart-dot" aria-hidden="true"></span>
          </div>
        </div>

        <!-- MUSIC INFO BOTTOM -->
        <div class="music-bottom">
          <div class="music-cover-wrapper">
            <img id="cover" src="" alt="Cover" class="music-cover" />
          </div>
          <div class="music-info">
            <div class="music-track" id="track">Titre</div>
            <div class="music-artist" id="artist">Artiste</div>
            <div class="music-progress-row">
              <div class="music-progress">
                <div class="music-progress-bar" id="progressBar"></div>
              </div>
              <div class="music-duration" id="musicDuration">0:00</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      // ========== CONFIGURATION ==========
      const config = {
        showTime: true,
        showWeather: true,
        showForecast: true,
        showSeconds: true,
        // Delay (in seconds) to apply to lyrics timing. Useful to compensate
        // network/request latency or clock offsets. Can be changed at runtime
        // via `setLyricsDelay(seconds)` or provided per-track via socket.
        lyricsDelaySeconds: +1,
      };

      // ========== DOM ELEMENTS ==========
      const timeEl = document.getElementById("time");
      const weatherEl = document.getElementById("weather");
      const weatherTempEl = document.getElementById("weatherTemp");
      const weatherIconEl = document.getElementById("weatherIcon");
      const timeCard = document.getElementById("timeCard");
      const weatherCard = document.getElementById("weatherCard");
      const musicCard = document.getElementById("musicCard");
      const forecastCard = document.getElementById("forecastCard");
      const forecastEl = document.getElementById("forecast");
      const trackEl = document.getElementById("track");
      const artistEl = document.getElementById("artist");
      const coverEl = document.getElementById("cover");
      const progressBar = document.getElementById("progressBar");
      const musicDurationEl = document.getElementById("musicDuration");
      const musicBottomEl = musicCard.querySelector(".music-bottom");
      const DEFAULT_MUSIC_CARD_BACKGROUND = "";
      const PLACEHOLDER_COVER =
        "data:image/svg+xml;utf8," +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4ecdc4" />
                <stop offset="100%" stop-color="#a78bfa" />
              </linearGradient>
            </defs>
            <rect width="400" height="400" rx="42" fill="#111827"/>
            <rect x="22" y="22" width="356" height="356" rx="34" fill="url(#g)" opacity="0.22"/>
            <circle cx="210" cy="132" r="22" fill="#f8fafc" opacity="0.92"/>
            <path d="M230 132v120c0 31-18 52-49 52-24 0-41-15-41-37 0-24 18-41 44-41 10 0 19 2 26 6V95l116-25v43l-96 21z"
              fill="#f8fafc" opacity="0.96"/>
          </svg>
        `);

      // ========== INITIALIZATION ==========
      function init() {
        updateDisplay();
        if (config.showWeather) getWeather();
        if (config.showForecast) getForecast();
        startClock();
      }

      function updateDisplay() {
        // Délai progressif pour animation en cascade
        const cards = [
          { el: timeCard, show: config.showTime, delay: 0 },
          { el: weatherCard, show: config.showWeather, delay: 100 },
          { el: forecastCard, show: config.showForecast, delay: 200 },
        ];

        cards.forEach(({ el, show, delay }) => {
          setTimeout(() => {
            el.classList.toggle("hidden", !show);
          }, delay);
        });

        // Expand forecast when music is hidden
        updateForecastLayout();
      }

      function updateForecastLayout() {
        const musicHidden = musicCard.classList.contains("hidden");
        forecastCard.classList.toggle("expanded", musicHidden);
      }

      // ========== CLOCK ==========
      function startClock() {
        function updateClock() {
          if (!config.showTime) return;
          const now = new Date();
          const opts = { hour: "2-digit", minute: "2-digit" };
          if (config.showSeconds) opts.second = "2-digit";
          timeEl.textContent = now.toLocaleTimeString([], opts);
        }
        updateClock();
        setInterval(updateClock, 1000);
      }

      // ========== WEATHER ==========
      function getWeather() {
        if (!config.showWeather) return;
        fetch("/api/weather")
          .then((res) => res.json())
          .then((data) => {
            weatherEl.textContent = `${data.name} · ${data.desc}`;
            weatherTempEl.textContent = `${data.temp}°C`;
            weatherIconEl.src = `/weather-icons/${data.icon}.svg`;
          })
          .catch(() => {
            weatherEl.textContent = "Erreur météo";
          });
      }

      // Refresh weather every 30min
      setInterval(() => {
        if (config.showWeather) getWeather();
      }, 30 * 60000);

      // ========== FORECAST ==========
      function getForecast() {
        if (!config.showForecast) return;

        fetch("/api/forecast")
          .then((res) => res.json())
          .then((data) => {
            forecastEl.innerHTML = "";
            data.list.forEach((f, index) => {
              const time = new Date(f.dt * 1000).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });

              const item = document.createElement("div");
              item.className = "forecast-item";
              item.style.animationDelay = `${index * 50}ms`;
              item.innerHTML = `
                <div class="forecast-time">${time}</div>
                <img class="forecast-icon" src="/weather-icons/${
                  f.icon
                }.svg" alt="${f.description}" />
                <div class="forecast-temp">${Math.round(f.temp)}°C</div>
                <div class="forecast-desc">${f.description}</div>
              `;
              forecastEl.appendChild(item);
            });
          })
          .catch((err) => {
            console.error("Forecast error:", err);
          });
      }

      // Refresh forecast every hour
      setInterval(() => {
        if (config.showForecast) getForecast();
      }, 60 * 60000);

      // ========== LYRICS ==========
      const lyricsContainer = document.getElementById("lyricsContainer");
      const lyricsWrapper = document.getElementById("lyricsWrapper");
      const lyricsLoading = document.getElementById("lyricsLoading");
      const lyricsNone = document.getElementById("lyricsNone");
      const lyricsPrestart = document.getElementById("lyricsPrestart");
      const lyricsContent = document.getElementById("lyricsContent");

      let currentLyrics = [];
      let activeLyricIndex = -1;
      let lyricsInterval = null;

      /**
       * Fetch lyrics via server-side cache proxy (/api/lyrics)
       */
      async function fetchLyrics(trackName, artistName) {
        setLyricsState("loading");

        try {
          const params = new URLSearchParams({
            track: trackName,
            artist: artistName,
          });
          const response = await fetch(`/api/lyrics?${params.toString()}`);

          if (!response.ok) {
            setLyricsState("none");
            return null;
          }

          const data = await response.json();
          if (!data || !data.syncedLyrics) {
            setLyricsState("none");
            return null;
          }

          return data.syncedLyrics;
        } catch (error) {
          console.error("Lyrics fetch error:", error);
          setLyricsState("none");
          return null;
        }
      }

      /**
       * Parse LRC format to structured array
       * Format: [mm:ss.xx] text
       */
      function parseLRC(lrcString) {
        const lines = lrcString.split("\n");
        const lyrics = [];

        const timeRegex = /\[(\d{2}):(\d{2})(?:[.:](\d{2,3}))?\]/g;

        for (const line of lines) {
          const matches = [...line.matchAll(timeRegex)];
          if (matches.length === 0) continue;

          // Extract text after all timestamps
          const text = line.replace(timeRegex, "").trim();
          if (!text) continue;

          for (const match of matches) {
            const minutes = parseInt(match[1], 10);
            const seconds = parseInt(match[2], 10);
            const ms = match[3]
              ? parseInt(match[3].padEnd(3, "0").slice(0, 3), 10)
              : 0;

            const time = minutes * 60 + seconds + ms / 1000;

            lyrics.push({ time, text });
          }
        }

        // Sort by time
        lyrics.sort((a, b) => a.time - b.time);

        return lyrics;
      }

      /**
       * Set lyrics display state
       */
      function setLyricsState(state) {
        // Déclencher la transition de layout d'abord pour un morphing fluide
        // (surtout de normal -> fullscreen).
        setFullscreenMode(state === "none");

        lyricsLoading.classList.toggle("active", state === "loading");
        lyricsNone.classList.toggle("active", state === "none");
        lyricsPrestart.classList.remove("active");
        lyricsContent.style.display = state === "lyrics" ? "flex" : "none";

        if (state !== "lyrics") {
          lyricsWrapper.style.transform = "translateY(-50%)";
        }
      }

      function setPrestartLyricsAnimation(waiting) {
        if (!lyricsPrestart) return;

        if (!waiting) {
          lyricsPrestart.classList.remove("active");
          lyricsContainer.classList.remove("prestart-waiting");
          return;
        }

        lyricsPrestart.classList.add("active");
        lyricsContainer.classList.add("prestart-waiting");
      }

      /**
       * Activer/désactiver le mode plein écran (sans paroles)
       */
      function setFullscreenMode(enabled) {
        const isCurrentlyEnabled =
          musicCard.classList.contains("fullscreen-mode");
        if (isCurrentlyEnabled === enabled) return;

        const prefersReducedMotion =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (prefersReducedMotion) {
          musicCard.classList.toggle("fullscreen-mode", enabled);
          return;
        }

        animateMusicMorphTransition(enabled);
      }

      /**
       * Animation FLIP pour montrer le déplacement des éléments
       * entre mode paroles et mode plein écran.
       */
      function animateMusicMorphTransition(enabled) {
        const elements = [
          musicCard,
          lyricsContainer,
          musicBottomEl,
          coverEl,
          trackEl,
          artistEl,
        ].filter(Boolean);

        const firstRects = new Map(
          elements.map((el) => [el, el.getBoundingClientRect()]),
        );

        musicCard.classList.toggle("fullscreen-mode", enabled);

        elements.forEach((el) => {
          const first = firstRects.get(el);
          const last = el.getBoundingClientRect();
          if (!first || !last) return;

          const dx = first.left - last.left;
          const dy = first.top - last.top;
          const sx = last.width > 0 ? first.width / last.width : 1;
          const sy = last.height > 0 ? first.height / last.height : 1;

          const hasMovement =
            Math.abs(dx) > 0.5 ||
            Math.abs(dy) > 0.5 ||
            Math.abs(sx - 1) > 0.02 ||
            Math.abs(sy - 1) > 0.02;

          if (!hasMovement) return;

          el.animate(
            [
              {
                transformOrigin: "center center",
                transform: `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`,
              },
              {
                transformOrigin: "center center",
                transform: "translate(0, 0) scale(1, 1)",
              },
            ],
            {
              duration: 520,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "both",
            },
          );
        });
      }

      /**
       * Render lyrics lines in the DOM
       */
      function renderLyrics(lyrics) {
        lyricsContent.innerHTML = "";
        currentLyrics = lyrics;
        activeLyricIndex = -1;

        lyrics.forEach((lyric, index) => {
          const line = document.createElement("div");
          line.className = "lyrics-line";
          line.textContent = lyric.text;
          line.dataset.index = index;
          lyricsContent.appendChild(line);
        });

        setLyricsState("lyrics");

        // Afficher immédiatement l'état intro si la première ligne
        // n'a pas encore commencé.
        const elapsed = (Date.now() - musicStartTime) / 1000;
        const currentTime =
          musicInitialPosition + elapsed + (config.lyricsDelaySeconds || 0);
        const firstLyricTime = currentLyrics[0]?.time ?? 0;
        setPrestartLyricsAnimation(currentTime < firstLyricTime);

        // Positionner immédiatement le bloc de paroles pour éviter
        // le "grand scroll" visible quand la première ligne démarre.
        if (currentTime < firstLyricTime) {
          scrollToLyricIndex(0);
        }
      }

      /**
       * Update active lyric based on current time
       */
      function updateActiveLyric(currentTime) {
        if (currentLyrics.length === 0) return;

        const firstLyricTime = currentLyrics[0]?.time ?? 0;
        const waitingFirstLyric = currentTime < firstLyricTime;
        setPrestartLyricsAnimation(waitingFirstLyric);

        if (waitingFirstLyric) {
          // Garder la première ligne déjà bien placée visuellement
          // avant son activation, pour éviter la remontée brutale.
          scrollToLyricIndex(0);

          const lines = lyricsContent.querySelectorAll(".lyrics-line");
          lines.forEach((line, index) => {
            line.classList.remove("active", "past", "near");
            if (index === 0 || index === 1) {
              line.classList.add("near");
            }
          });

          activeLyricIndex = -1;
          return;
        }

        // Find the current lyric index
        let newIndex = -1;
        for (let i = currentLyrics.length - 1; i >= 0; i--) {
          if (currentTime >= currentLyrics[i].time) {
            newIndex = i;
            break;
          }
        }

        if (newIndex === activeLyricIndex) return;

        activeLyricIndex = newIndex;

        // Update line classes
        const lines = lyricsContent.querySelectorAll(".lyrics-line");
        lines.forEach((line, index) => {
          line.classList.remove("active", "past", "near");

          if (index === activeLyricIndex) {
            line.classList.add("active");
          } else if (index < activeLyricIndex) {
            line.classList.add("past");
          } else if (index <= activeLyricIndex + 2) {
            line.classList.add("near");
          }
        });

        // Scroll to active line
        scrollToActiveLine();
      }

      /**
       * Smooth scroll to center active lyric line
       */
      function scrollToActiveLine() {
        if (activeLyricIndex < 0) return;
        scrollToLyricIndex(activeLyricIndex);
      }

      /**
       * Center a lyric line by index in the lyrics container.
       */
      function scrollToLyricIndex(index) {
        if (index < 0) return;
        const lines = lyricsContent.querySelectorAll(".lyrics-line");
        const target = lines[index];
        if (!target) return;

        const lineOffset = target.offsetTop;
        const lineHeight = target.offsetHeight;
        const scrollOffset = lineOffset + lineHeight / 2;
        lyricsWrapper.style.transform = `translateY(${-scrollOffset}px)`;
      }

      /**
       * Start lyrics synchronization
       */
      function startLyricsSync() {
        if (lyricsInterval) clearInterval(lyricsInterval);

        lyricsInterval = setInterval(() => {
          const elapsed = (Date.now() - musicStartTime) / 1000;
          // Apply optional lyrics delay here so the active line selection
          // can be shifted forward/backward to compensate for latency.
          const currentTime =
            musicInitialPosition + elapsed + (config.lyricsDelaySeconds || 0);
          updateActiveLyric(currentTime);
        }, 250);
      }

      /**
       * Set lyrics delay in seconds at runtime. Positive values delay lyrics
       * (show later), negative values advance them (show earlier).
       */
      function setLyricsDelay(seconds) {
        if (typeof seconds !== "number" || isNaN(seconds)) return;
        config.lyricsDelaySeconds = seconds;

        // If sync is running, restart to immediately apply the new delay
        if (lyricsInterval) {
          clearInterval(lyricsInterval);
          lyricsInterval = null;
          startLyricsSync();
        }
      }

      /**
       * Stop lyrics synchronization
       */
      function stopLyricsSync(nextState = "none") {
        if (lyricsInterval) {
          clearInterval(lyricsInterval);
          lyricsInterval = null;
        }
        setPrestartLyricsAnimation(false);
        currentLyrics = [];
        activeLyricIndex = -1;
        lyricsContent.innerHTML = "";
        setLyricsState(nextState);
      }

      // ========== MUSIC ==========
      let musicTimeout;
      let progressInterval;
      let musicStartTime;
      let musicInitialPosition = 0;
      let musicDuration = 0;
      let currentSongKey = "";

      function resetMusicCardBackground() {
        musicCard.style.background = DEFAULT_MUSIC_CARD_BACKGROUND;
      }

      function setCoverWithFallback(coverUrl) {
        const nextSrc =
          coverUrl && String(coverUrl).trim() ? coverUrl : PLACEHOLDER_COVER;
        coverEl.dataset.fallbackApplied = "0";
        coverEl.src = nextSrc;
      }

      coverEl.addEventListener("error", () => {
        if (coverEl.dataset.fallbackApplied === "1") return;
        coverEl.dataset.fallbackApplied = "1";
        coverEl.src = PLACEHOLDER_COVER;
        resetMusicCardBackground();
      });

      async function animateSongChangeIfNeeded(isSongChanged, applyUpdate) {
        const prefersReducedMotion =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const canAnimate =
          isSongChanged &&
          !prefersReducedMotion &&
          !musicCard.classList.contains("hidden");

        if (!canAnimate) {
          applyUpdate();
          return;
        }

        const animTargets = [
          coverEl,
          trackEl,
          artistEl,
          musicBottomEl,
          lyricsContainer,
        ].filter(Boolean);

        const outAnims = animTargets.map((el) =>
          el.animate(
            [
              {
                opacity: 1,
                transform: "translateY(0) scale(1)",
                filter: "blur(0)",
              },
              {
                opacity: 0.18,
                transform: "translateY(10px) scale(0.985)",
                filter: "blur(2px)",
              },
            ],
            {
              duration: 180,
              easing: "cubic-bezier(0.4, 0, 0.2, 1)",
              fill: "forwards",
            },
          ),
        );

        await Promise.all(outAnims.map((a) => a.finished.catch(() => null)));

        applyUpdate();

        const inAnims = animTargets.map((el) =>
          el.animate(
            [
              {
                opacity: 0.18,
                transform: "translateY(-10px) scale(0.985)",
                filter: "blur(2px)",
              },
              {
                opacity: 1,
                transform: "translateY(0) scale(1)",
                filter: "blur(0)",
              },
            ],
            {
              duration: 340,
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "both",
            },
          ),
        );

        await Promise.all(inAnims.map((a) => a.finished.catch(() => null)));
      }

      // Start or restart the progress interval (throttled to reduce CPU)
      function startProgressInterval() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
          const elapsed = (Date.now() - musicStartTime) / 1000;
          const currentPosition = musicInitialPosition + elapsed;
          let progress = 0;
          if (musicDuration > 0) {
            progress = Math.min((currentPosition / musicDuration) * 100, 100);
          }
          progressBar.style.width = `${progress}%`;

          if (musicDuration > 0 && currentPosition >= musicDuration) {
            clearInterval(progressInterval);
            hideMusicCard();
          }
        }, 250); // slower updates to save CPU on low-power devices
      }

      socket.on("musicData", async (data) => {
        // Clear previous timers
        if (musicTimeout) clearTimeout(musicTimeout);
        if (progressInterval) clearInterval(progressInterval);
        // Entre deux morceaux, on passe en état loading (pas fullscreen immédiat)
        // pour éviter un aller-retour visuel avant le résultat des paroles.
        stopLyricsSync("loading");

        const nextSongKey = `${data.title || ""}__${data.artist || ""}`;
        const isSongChanged = nextSongKey !== currentSongKey;

        // Store timing FIRST (needed for lyrics sync)
        musicInitialPosition = data.position || 0;
        musicDuration = data.duration || 0;
        musicStartTime = Date.now();

        // Afficher la durée totale formatée
        if (musicDurationEl)
          musicDurationEl.textContent = formatTime(musicDuration);

        await animateSongChangeIfNeeded(isSongChanged, () => {
          // Update music info
          trackEl.textContent = data.title || "Titre inconnu";
          artistEl.textContent = data.artist || "Artiste inconnu";
          setCoverWithFallback(data.cover);
        });
        currentSongKey = nextSongKey;

        // Fetch and display lyrics (async, timing vars already set)
        fetchLyrics(data.title, data.artist).then((syncedLyrics) => {
          if (syncedLyrics) {
            const lyrics = parseLRC(syncedLyrics);
            if (lyrics.length > 0) {
              renderLyrics(lyrics);
              startLyricsSync();
            } else {
              setLyricsState("none");
            }
          }
        });

        // Extract dominant color from cover
        if (data.cover) {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = data.cover;

          img.onload = () => {
            try {
              const colorThief = new ColorThief();
              const [r, g, b] = colorThief.getColor(img);
              const luminance = 0.299 * r + 0.587 * g + 0.114 * b;

              // Apply dynamic gradient
              musicCard.style.background = `
                linear-gradient(135deg, 
                  rgba(${r}, ${g}, ${b}, 0.3) 0%, 
                  rgba(${r * 0.7}, ${g * 0.7}, ${b * 0.7}, 0.2) 100%
                )
              `;
            } catch (e) {
              console.error("Color extraction failed:", e);
              resetMusicCardBackground();
            }
          };
          img.onerror = () => {
            resetMusicCardBackground();
          };
        } else {
          resetMusicCardBackground();
        }

        // Show music card with animation
        musicCard.classList.remove("hidden");
        updateForecastLayout();

        // Smooth progress animation (throttled)
        startProgressInterval();

        // Auto-hide when song ends
        const remaining = musicDuration - musicInitialPosition;
        if (remaining > 0) {
          musicTimeout = setTimeout(() => {
            hideMusicCard();
          }, remaining * 1000);
        }
      });

      function hideMusicCard() {
        musicCard.classList.add("hidden");
        if (progressInterval) clearInterval(progressInterval);
        progressBar.style.width = "0%";
        if (musicDurationEl) musicDurationEl.textContent = "0:00";
        stopLyricsSync();
        updateForecastLayout();
      }

      function formatTime(seconds) {
        if (!seconds || isNaN(seconds) || seconds <= 0) return "0:00";
        const s = Math.floor(seconds % 60);
        const m = Math.floor(seconds / 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      // ========== START ==========

      // If the user prefers reduced motion, apply class to pause animations
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches
      ) {
        document.body.classList.add("reduced-motion");
      }

      // Pause heavy timers/animations when the page is not visible
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          document.body.classList.add("paused-animations");
          if (lyricsInterval) {
            clearInterval(lyricsInterval);
            lyricsInterval = null;
          }
          if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
          }
        } else {
          document.body.classList.remove("paused-animations");
          // restart progress and lyrics sync if needed
          if (!progressInterval && !musicCard.classList.contains("hidden"))
            startProgressInterval();
          if (!lyricsInterval && currentLyrics.length > 0) startLyricsSync();
        }
      });

      // On tablet-sized screens, disable page panning if plenty of empty space
      function applyNoPanForTablet() {
        const isTabletLike = window.matchMedia(
          "(max-width: 900px), (max-height: 900px)",
        ).matches;
        if (isTabletLike) {
          document.body.classList.add("no-pan");
          // also set style for older browsers
          document.body.style.touchAction = "none";
          document.documentElement.style.overscrollBehavior = "none";
        } else {
          document.body.classList.remove("no-pan");
          document.body.style.touchAction = "manipulation";
          document.documentElement.style.overscrollBehavior = "auto";
        }
      }

      // Apply on load and when resized/orientation changes
      applyNoPanForTablet();
      window.addEventListener("resize", applyNoPanForTablet);

      init();
    </script>
  </body>
</html>
