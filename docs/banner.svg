<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13171e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bg)"/>
  
  <!-- Ambient circles -->
  <circle cx="150" cy="150" r="80" fill="rgba(78, 205, 196, 0.08)"/>
  <circle cx="1050" cy="150" r="100" fill="rgba(167, 139, 250, 0.06)"/>
  
  <!-- Main title -->
  <text x="600" y="140" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="72" font-weight="700" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">
    Tab Screen
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="185" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
    Dashboard temps réel avec paroles synchronisées
  </text>
  
  <!-- Bottom line accent -->
  <line x1="400" y1="230" x2="800" y2="230" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
</svg>
